build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  system_packages:
    - "libgl1"
    - "libglib2.0-0"
  python_packages:
    - "ultralytics==8.3.0"
    - "sahi==0.11.20"
    - "opencv-python-headless==4.10.0.84"
    - "numpy==1.26.4"
  run:
    - "python -c \"from ultralytics import YOLO; YOLO('yolo11m-pose.pt'); YOLO('yolo11m.pt')\""